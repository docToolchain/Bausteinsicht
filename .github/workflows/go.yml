name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./...

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - name: Generate coverage report
        run: |
          mkdir -p coverage
          go test -coverprofile=coverage/coverage.out ./... || true
          go tool cover -html=coverage/coverage.out -o coverage/coverage.html
      - name: Calculate coverage percentage
        id: coverage
        run: |
          if [ -f coverage/coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage/coverage.out | grep total | awk '{print $NF}')
            echo "percentage=${COVERAGE}" >> $GITHUB_OUTPUT
            echo "📊 Code Coverage: ${COVERAGE}"
          fi
      - name: Create coverage markdown summary
        if: always()
        run: |
          if [ ! -f coverage/coverage.out ]; then
            exit 0
          fi

          go tool cover -func=coverage/coverage.out > coverage/coverage.txt

          # Create markdown report
          {
            echo "# 📊 Code Coverage Report"
            echo ""
            echo "## Summary"
            echo ""
            COVERAGE=$(grep total coverage/coverage.txt | awk '{print $NF}')
            echo "**Overall Coverage:** \`${COVERAGE}\`"
            echo ""
            echo "## Coverage by Package"
            echo ""
            echo "| Package | Coverage |"
            echo "|---------|----------|"
            grep -v total coverage/coverage.txt | sort -k1 | awk '{printf "| %s | %s |\n", $1, $3}' | sed 's|github.com/docToolchain/Bausteinsicht/||g'
            echo ""
            echo "_Generated by GitHub Actions CI_"
          } > coverage/COVERAGE.md

          # Append to job summary for visibility in workflow run
          cat coverage/COVERAGE.md >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage report
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: false

  schema-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - run: make schema-validate

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6
        with:
          version: latest
